<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GameVault</title>
  <link rel="icon" href="assets/logo.png" type="image/png" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <!-- Config — edit config.js to add games, never touch this file -->
  <script src="config.js"></script>

  <style>
    :root {
      --bg:     #0e0800;
      --bg2:    #1a1000;
      --card:   #1f1508;
      --card2:  #2b1e0d;
      --border: #3d2a10;
      --amber:  #c8741a;
      --amber2: #e8943a;
      --gold:   #f5b060;
      --text:   #f0dfc0;
      --muted:  #9a7a50;
      --dim:    #5a4428;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* noise */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px; pointer-events: none; z-index: 0;
    }

    /* glow orbs */
    .glow { position:fixed; border-radius:50%; filter:blur(120px); pointer-events:none; z-index:0; }
    .glow-1 { width:600px;height:600px; background:radial-gradient(circle,rgba(200,116,26,.12) 0%,transparent 70%); top:-200px;left:-100px; }
    .glow-2 { width:500px;height:500px; background:radial-gradient(circle,rgba(232,148,58,.08) 0%,transparent 70%); bottom:-100px;right:-100px; }

    /* ── HEADER ── */
    header {
      position:sticky; top:0; z-index:100;
      background:rgba(14,8,0,.9); backdrop-filter:blur(16px);
      border-bottom:1px solid var(--border);
      display:flex; align-items:center; gap:1rem;
      padding:0 2rem; height:56px;
    }

    .logo { display:flex;align-items:center;gap:.75rem;text-decoration:none;flex-shrink:0; }
    .logo img { height:34px;width:34px;object-fit:contain;filter:drop-shadow(0 0 8px rgba(200,116,26,.5));transition:filter .3s; }
    .logo:hover img { filter:drop-shadow(0 0 14px rgba(232,148,58,.8)); }
    .logo-text {
      font-family:'Bebas Neue',sans-serif; font-size:1.75rem; letter-spacing:3px;
      background:linear-gradient(135deg,var(--gold) 0%,var(--amber2) 60%,var(--amber) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    }

    /* nav tabs */
    nav { display:flex;align-items:center;gap:.25rem;margin-left:1.5rem;height:100%; }
    .nav-tab {
      background:none; border:none; color:var(--muted); cursor:pointer;
      font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:700;
      letter-spacing:.5px; padding:0 1rem; height:100%;
      border-bottom:2px solid transparent;
      text-transform:uppercase; transition:color .2s, border-color .2s; white-space:nowrap;
    }
    .nav-tab:hover { color:var(--text); }
    .nav-tab.active { color:var(--amber2); border-bottom-color:var(--amber2); }

    .header-right { margin-left:auto; display:flex; align-items:center; gap:1rem; }

    /* search */
    .search-wrap { position:relative; }
    .search-wrap svg { position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);pointer-events:none; }
    #search {
      background:var(--card); border:1px solid var(--border); border-radius:8px;
      color:var(--text); font-family:'Nunito',sans-serif; font-size:.875rem;
      padding:.45rem 1rem .45rem 2.2rem; width:210px; outline:none;
      transition:border-color .2s, box-shadow .2s;
    }
    #search:focus { border-color:var(--amber); box-shadow:0 0 0 3px rgba(200,116,26,.15); }
    #search::placeholder { color:var(--dim); }

    /* ── HERO ── */
    .hero { position:relative;z-index:1; padding:3.5rem 2rem 2rem; text-align:center; }
    .hero h1 {
      font-family:'Bebas Neue',sans-serif;
      font-size:clamp(2.5rem,7vw,5.5rem); letter-spacing:6px; line-height:1;
      background:linear-gradient(160deg,var(--gold) 0%,var(--amber2) 50%,var(--amber) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      margin-bottom:.4rem;
    }
    .hero p { color:var(--muted); font-size:.95rem; letter-spacing:.5px; }

    /* ── FILTER PILLS ── */
    .filters {
      position:relative; z-index:1;
      display:flex; gap:.6rem; justify-content:center; flex-wrap:wrap;
      padding:0 2rem 2.5rem;
    }
    .pill {
      background:var(--card); border:1px solid var(--border); border-radius:999px;
      color:var(--muted); cursor:pointer;
      font-family:'Nunito',sans-serif; font-size:.8rem; font-weight:700;
      letter-spacing:.5px; padding:.35rem 1rem;
      transition:all .2s; text-transform:uppercase;
    }
    .pill:hover, .pill.active { background:var(--amber); border-color:var(--amber); color:#0e0800; }

    /* ── GRID ── */
    .grid-wrap { position:relative;z-index:1; padding:0 2rem 5rem; max-width:1400px; margin:0 auto; }
    .section-label {
      font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:3px;
      color:var(--amber); border-left:3px solid var(--amber); padding-left:.75rem; margin-bottom:1.25rem;
    }
    #item-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:1.2rem; }

    /* ── CARD ── */
    .item-card {
      background:var(--card); border:1px solid var(--border); border-radius:14px;
      cursor:pointer; overflow:hidden;
      transition:transform .22s cubic-bezier(.22,1,.36,1), border-color .2s, box-shadow .2s;
      animation:fadeUp .4s both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .item-card:hover {
      transform:translateY(-6px) scale(1.02);
      border-color:var(--amber2);
      box-shadow:0 12px 40px rgba(200,116,26,.2);
    }

    .card-thumb {
      aspect-ratio:16/9; background:var(--card2);
      display:flex; align-items:center; justify-content:center;
      overflow:hidden; position:relative;
    }
    .card-thumb img { width:100%;height:100%;object-fit:cover; }
    .thumb-icon { font-size:2.8rem; opacity:.35; }

    .play-overlay {
      position:absolute; inset:0;
      display:flex; align-items:center; justify-content:center;
      background:rgba(200,116,26,0); transition:background .2s;
    }
    .item-card:hover .play-overlay { background:rgba(200,116,26,.15); }
    .play-overlay svg { opacity:0; transform:scale(.75); transition:opacity .2s, transform .2s; }
    .item-card:hover .play-overlay svg { opacity:1; transform:scale(1); }

    .card-body { padding:.8rem 1rem; }
    .card-title { font-weight:700; font-size:.92rem; margin-bottom:.25rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .card-tag {
      display:inline-block; background:var(--card2); border-radius:4px;
      color:var(--amber2); font-size:.68rem; font-weight:700;
      letter-spacing:.5px; padding:.1rem .4rem; text-transform:uppercase;
    }

    /* empty */
    #empty { grid-column:1/-1; text-align:center; padding:4rem 0; color:var(--dim); display:none; }
    #empty svg { margin-bottom:.75rem; color:var(--border); }

    /* ── MODAL (used when openMode = 'modal') ── */
    #gv-modal {
      position:fixed; inset:0; z-index:999;
      background:rgba(10,6,0,.97);
      display:flex; flex-direction:column;
      opacity:0; pointer-events:none; transition:opacity .25s;
    }
    #gv-modal.open { opacity:1; pointer-events:all; }
    .modal-bar {
      display:flex; align-items:center; gap:1rem; padding:.55rem 1.25rem;
      background:rgba(20,12,0,.95); border-bottom:1px solid var(--border); flex-shrink:0;
    }
    #modal-title { font-family:'Bebas Neue',sans-serif; font-size:1.3rem; letter-spacing:2px; color:var(--gold); }
    .btn-close {
      margin-left:auto; background:var(--card2); border:1px solid var(--border); border-radius:8px;
      color:var(--muted); cursor:pointer; display:flex; align-items:center; gap:.4rem;
      font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:700; padding:.4rem .85rem;
      transition:all .2s;
    }
    .btn-close:hover { border-color:var(--amber); color:var(--text); }
    #gv-frame { flex:1; border:none; width:100%; background:#000; }

    /* footer */
    footer {
      position:relative; z-index:1;
      border-top:1px solid var(--border); padding:1.5rem 2rem;
      text-align:center; color:var(--dim); font-size:.78rem;
    }
    footer span { color:var(--amber); }
    footer code { background:var(--card); border-radius:4px; padding:.05rem .35rem; font-size:.75rem; color:var(--amber2); }

    ::-webkit-scrollbar { width:6px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--amber); }
  </style>
</head>
<body>

  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <header>
    <a class="logo" href="#">
      <img src="assets/logo.png" alt="logo" />
      <span class="logo-text" id="site-name">GameVault</span>
    </a>
    <nav id="top-nav"></nav>
    <div class="header-right">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search" placeholder="Search…" autocomplete="off" />
      </div>
    </div>
  </header>

  <section class="hero">
    <h1 id="hero-title"></h1>
    <p id="hero-sub"></p>
  </section>

  <div class="filters" id="filters"></div>

  <div class="grid-wrap">
    <div class="section-label" id="section-label"></div>
    <div id="item-grid">
      <div id="empty">
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <p style="font-size:1rem;font-weight:700;margin-bottom:.25rem">Nothing here yet</p>
        <p style="font-size:.82rem">Add items to this section in <code>config.js</code></p>
      </div>
    </div>
  </div>

  <footer>
    To add content: edit <code>config.js</code>, drop files in <code>games/</code> or <code>apps/</code> &nbsp;·&nbsp; <span>♥</span> GameVault
  </footer>

  <!-- Modal (only visible when openMode = 'modal') -->
  <div id="gv-modal">
    <div class="modal-bar">
      <span id="modal-title"></span>
      <button class="btn-close" id="modal-close">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Close (Esc)
      </button>
    </div>
    <iframe id="gv-frame" src="" allowfullscreen></iframe>
  </div>

  <script>
    // ── pull settings from config.js ──────────────────────────
    const { siteName, openMode, tabs, sections } = CONFIG;
    document.getElementById('site-name').textContent = siteName;
    document.title = siteName;

    // ── state ─────────────────────────────────────────────────
    let activeTab    = tabs[0]?.id || '';
    let activeFilter = 'all';
    let searchQuery  = '';

    // ── modal refs ────────────────────────────────────────────
    const modal  = document.getElementById('gv-modal');
    const frame  = document.getElementById('gv-frame');
    document.getElementById('modal-close').onclick = closeModal;
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    function closeModal() {
      modal.classList.remove('open');
      document.body.style.overflow = '';
      setTimeout(() => { frame.src = ''; }, 300);
    }

    // ── open an item ──────────────────────────────────────────
    function openItem(item) {
      const url = item.file; // always a local file path from config.js

      if (openMode === 'aboutblank') {
        const w = window.open('about:blank', '_blank');
        if (!w) { alert('Please allow pop-ups for this site.'); return; }
        w.document.open();
        w.document.write(
          '<!DOCTYPE html><html><head><meta charset="UTF-8">' +
          '<style>*{margin:0;padding:0;box-sizing:border-box}' +
          'html,body{height:100%;overflow:hidden;background:#000}</style>' +
          '</head><body>' +
          '<iframe src="' + url + '" style="width:100%;height:100vh;border:none" allowfullscreen></iframe>' +
          '</body></html>'
        );
        w.document.close();

      } else if (openMode === 'newtab') {
        window.open(url, '_blank');

      } else {
        // modal
        document.getElementById('modal-title').textContent = item.title;
        frame.src = url;
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
    }

    // ── build nav tabs from config ────────────────────────────
    const nav = document.getElementById('top-nav');
    tabs.forEach(tab => {
      const btn = document.createElement('button');
      btn.className = 'nav-tab' + (tab.id === activeTab ? ' active' : '');
      btn.textContent = tab.label;
      btn.dataset.tab = tab.id;
      btn.onclick = () => {
        document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        activeTab    = tab.id;
        activeFilter = 'all';
        searchQuery  = '';
        document.getElementById('search').value = '';
        render();
      };
      nav.appendChild(btn);
    });

    // ── render ────────────────────────────────────────────────
    function render() {
      const section = sections[activeTab];
      if (!section) return;

      document.getElementById('hero-title').textContent = tabs.find(t => t.id === activeTab)?.label || '';
      document.getElementById('hero-sub').textContent   = section.subtitle || '';
      document.title = (tabs.find(t => t.id === activeTab)?.label || siteName) + ' · ' + siteName;

      // filter pills
      const cats = ['all', ...new Set((section.items || []).map(i => i.category).filter(Boolean))];
      const filtersEl = document.getElementById('filters');
      filtersEl.innerHTML = '';
      cats.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'pill' + (cat === activeFilter ? ' active' : '');
        btn.textContent = cat === 'all'
          ? 'All ' + (tabs.find(t => t.id === activeTab)?.label || '')
          : cat;
        btn.onclick = () => { activeFilter = cat; render(); };
        filtersEl.appendChild(btn);
      });

      // filter items
      const items = (section.items || []).filter(it => {
        const matchCat    = activeFilter === 'all' || it.category === activeFilter;
        const matchSearch = !searchQuery || it.title.toLowerCase().includes(searchQuery.toLowerCase());
        return matchCat && matchSearch;
      });

      document.getElementById('section-label').textContent =
        (activeFilter === 'all'
          ? 'ALL ' + (tabs.find(t => t.id === activeTab)?.label || '')
          : activeFilter
        ).toUpperCase();

      const grid = document.getElementById('item-grid');
      [...grid.querySelectorAll('.item-card')].forEach(c => c.remove());
      const emptyEl = document.getElementById('empty');

      if (items.length === 0) {
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      items.forEach((item, i) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.style.animationDelay = i * 50 + 'ms';
        card.onclick = () => openItem(item);

        const tint = (item.color || '#2b1e0d') + '33';
        const thumbInner = item.thumb
          ? `<img src="${item.thumb}" alt="${item.title}" loading="lazy">`
          : `<span class="thumb-icon">${item.emoji || '🎮'}</span>`;

        card.innerHTML =
          '<div class="card-thumb" style="background:' + tint + '">' +
            thumbInner +
            '<div class="play-overlay">' +
              '<svg width="42" height="42" viewBox="0 0 24 24">' +
                '<circle cx="12" cy="12" r="11" fill="rgba(14,8,0,.7)"/>' +
                '<polygon points="10,8 18,12 10,16" fill="rgba(245,176,96,.95)"/>' +
              '</svg>' +
            '</div>' +
          '</div>' +
          '<div class="card-body">' +
            '<div class="card-title">' + item.title + '</div>' +
            (item.category ? '<span class="card-tag">' + item.category + '</span>' : '') +
          '</div>';

        grid.appendChild(card);
      });
    }

    // ── search ────────────────────────────────────────────────
    document.getElementById('search').addEventListener('input', e => {
      searchQuery = e.target.value;
      render();
    });

    render();
  </script>
</body>
</html>
